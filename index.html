s to quality cars from abroad.`,p3:"In 2020, I founded the Automotive Market Research Institute (AMRI) — built the project from scratch, from idea and concept to the most well-known automotive analytics center in Ukraine. AMRI became the #1 source of analytics for thousands of companies, government agencies, and 120+ media. In 2025, I became Co-Founder of LATWO — a next-generation AI consulting agency.",p4:"Today I combine deep industry expertise with practical experience in SaaS product development and AI implementation. Through active networking, I have built a wide network of professional contacts in Ukraine and abroad — from car dealers to international analytics companies. My mission is to help entrepreneurs build systematic businesses and look confidently into the future.",timeline_title:"Key Milestones",hobbies_title:"Hobbies",hobbies:["Retro cars","Genealogy"]},timeline:[{year:"2009-2014",text:"Architecture degree, Lviv Polytechnic National University"},{year:"2014",text:"Started civic activism. Campaigns for accessible automotive market"},{year:"2016",text:"First legislative changes — liberalization of auto imports"},{year:"2017",text:'"Mykola Zaporozhets" project — millions of views, legislative changes. Joined West Auto Hub'},{year:"2018",text:'Further legislative changes. "Accessible Auto" civic org. Marketing & PR Consultant at WAH'},{year:"2019",text:"Head Business Analyst at West Auto Hub. NGO Management at UCU"},{year:"2020",text:"Founded AMRI. Imported first car as historical value in Ukraine"},{year:"2021",text:"First offline conference for used car dealers"},{year:"2022",text:"Publications in Forbes Ukraine, WardsAuto. Partnership with IBRM Samar"},{year:"2023",text:"Senior BA at Dilizy.ai. MSc Strategic Management, WSEI Lublin"},{year:"2024",text:"Founded Staretro — retro car company"},{year:"2025",text:"CEO Dilizy.ai (until March 2026). Co-Founder LATWO"},{year:"2026",text:"Completed collaboration with Dilizy. Focus on LATWO and AMRI"}],expertis s and results",items:[{name:"Dilizy.ai — Automotive SaaS Ecosystem",role:"Senior BA → Product Owner → CEO",period:"May 2023 — March 2026",results:["Designed and launched ecosystem: DMS (dealers), SMS (services), PWA, BigData module","Moved development in-house — 40% cost reduction, delivery speed ×2","Implemented AI-powered car recommendations and support automation","GTM strategy: successful product launch in Poland and Ukraine","Built strategic partner network in the EU; adapted business model to EU standards","Achieved 90% targeted leads in BigData campaigns"]},{name:"AMRI — Automotive Market Research Institute",role:"Founder & CEO",period:"2020 — present",results:["Built from scratch, from idea and concept to the #1 automotive analytics center in Ukraine, the most well-known in the country","Became the most cited automotive market expert in Ukraine — Forbes, Wired, Avtotsentr, Auto.ria, WardsAuto etc.","Created the first Big Data infrastructure for automotive market in the country: Tableau dashboards, monthly reports, forecasting models","AMRI data used by government agencies, international partners, car dealers and 120+ media","Built a wide network of professional contacts in Ukraine and abroad through active networking","Speaking at AUTO.RIA conferences, auto camps. Live comments on 1+1, ICTV, Kyiv24, Suspilne, Radio NV, National Marathon","Author columns for Forbes, WardsAuto, Wired, Avtotsentr, 24 Kanal, lb.ua etc."]},{name:"West Auto Hub (WAH)",role:"Head Business Analyst / Marketing & PR Consultant",period:"2017 — 2024",results:["Multi-tasking role: implemented analytics, built marketing, appeared in videos, created content","Developed certification software from scratch — full cycle from needs discovery to delivery","Worked on the Webex24 system and other software products for automotive business","Built management dashboards; department efficiency analysis, KPI system","Built marketing strategy and PR from scratch: positioning, content, video communications","Launched data-driven performance campaigns; growth of qualified leads"]}]},civic:{sectionTag:"Advocacy",title:"Civic Activity",subtitle:"Advocacy for change and legislation",items:[{title:'"Mykola Zaporozhets" Project (2017)',desc:"Media project with millions of views that directly led to changes in Ukraine's customs legislation and opened opportunities for business. Wide public resonance."},{title:'"Accessible Auto" Civic Org (2017 — 2020)',desc:'Civic organization founded after "Mykola Zaporozhets". Import liberalization (2016), lowering eco-standards to Euro-2, changing excise duties (2018) — opened the market for business.'},{title:"AMRI — Building a Civilized Market (2020 — present)",desc:"Automotive Market Research Institute as a social initiative — building a civilized used car market in Ukraine. Transparency, fighting odometer fraud, analytics for society."},{title:"Retro Car Legalization & Historical Values",desc:"Active participation in legalizing retro cars. In 2020, imported the first car as a historical value in Ukraine. In 2024, founded Staretro."},{title:"Legislative Work (2014 — present)",desc:"Active participation in shaping legislation: market transparency, fighting odometer fraud."}]},media:{sectionTag:"Press & Media",title:"Media & Public Activity",subtitle:"Most cited automotive expert in Ukraine",quotes:[{text:"The source of corruption is customs officers who can set the customs value of a car at their own discretion. An undervalued customs value allows reducing the tax amount.",source:"Forbes Ukraine",link:"https://forbes.ua/inside/cherez-pilgi-tsini-na-vzhivani-avto-vpali-na-chvert-do-5100-i-znovu-zrosli-skilki-budut-koshtuvati-bu-mashini-dali-28072022-7413"},{text:"The price peak of the mass-market used passenger cars is around the $5,000 mark. This is the indicator of the real purchasing power of the population for buying transport with their own money.",source:"Ekonomichna Pravda",link:"https://epravda.com.ua/publications/2023/12/15/707718/"},{text:"In Ukraine, the secondary market significantly dominates. The market for new cars is extremely small. The car market of Ukraine has recovered to about 80% of the level before the full-scale invasion.",source:"WardsAuto",link:"https://www.wardsauto.com/news/archive-wards-war-slows-but-doesn-t-stop-ukraine-s-auto-industry/797184/"}],mediaCount:"120+",mediaCountLabel:"media partners",logos:["Forbes Ukraine","WardsAuto","Ekonomichna Pravda","1+1","ICTV (Fakty)","Radio NV","Suspilne","Kyiv24","24 Kanal","Hromadske Radio","TSN.ua","National Marathon","Gazeta Wyborcza","Polskie Radio 24","IBRM Samar","NV","ZN.UA","Obozrevatel","Apostrophe","lb.ua","Delo.ua","finance.ua","Focus","motofakty.pl"],categories:{speeches:"Public Speaking — AUTO.RIA conferences, auto camps, webinars, AI transformation forums",tv:"TV & Radio — 1+1, ICTV, Kyiv24, Suspilne, National Marathon, Radio NV, Hromadske Radio, Polskie Radio 24",blogs:"Author Blogs — Forbes, WardsAuto, Wired, Avtotsentr, Auto.ria, 24 Kanal, lb.ua etc."}},latwo:{sectionTag:"Ecosystem",title:"LATWO — Consulting that works",subtitle:"Next-generation consulting ecosystem",description:"LATWO is not just an agency. It's a platform for entrepreneurs who want to build systematic businesses. We turn complexity into clarity, and ideas into measurable results.",mission:"Helping entrepreneurs transition from chaos to system — building predictable, manageable, scalable businesses that combine profit and values.",missionLabel:"Mission",cta:"Learn More about LATWO",services:[{title:"Consulting Core",desc:"Strategy, systems, proof of concept"},{title:"Data & Analytics",desc:"BI, markets, KPIs, data-driven decisions"},{title:"AI & Automation",desc:"AI implementation and process automation"},{title:"Education & Events",desc:"Training, camps, public speaking"},{title:"Implementation",desc:"Engaging partners for full-cycle delivery"}]},contact:{sectionTag:"Get in touch",title:"Let's Collaborate",subtitle:"If you want to take your business to the next level, need expert consultation, or are looking for a speaker — write to me.",form:{name:"Your Name",namePlaceholder:"What's your name?",email:"Email",emailPlaceholder:"your@email.com",message:"Message",messagePlaceholder:"Tell me about your inquiry or project...",submit:"Send",sending:"Sending...",success:"Thank you! Your message has been received.",error:"Error sending message. Please try again."},directLabel:"Direct Contact",socialLabel:"Social",info:{email:"s.buczacki@gmail.com",phone:"+380981980898",phoneFormatted:"+38 098 198 08 98"}},testimonials:{sectionTag:"Testimonials",title:"What People Say",subtitle:"Recommendations from colleagues and partners on LinkedIn",items:[{name:"Wojciech Drzewiecki",role:"CEO & President, IBRM Samar",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/ВойцехДжевєцкі_ed6d6703.jfif",quote:"I wholeheartedly recommend Stanisław Buczacki as an exceptional expert in automotive market analytics. He created the equivalent of IBRM SAMAR on the Ukrainian market, which quickly became the primary source of knowledge about the automotive market in Ukraine."},{name:"Artem Umanets",role:"CEO AUTO.RIA",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/АртемУманець_2b625f28.jfif",quote:"I highly recommend Stanislav Buczacki as a business analyst and market entry expert. He possesses a rare combination of deep analytical skills and a practical entrepreneurial mindset."},{name:"Felipe Munoz",role:"Motor Industry Specialist",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/Felipe_df5ecc9a.jfif",quote:"I have worked with Stanislav thanks to his commitment to get insights about the Ukrainian car market. His professionalism and dedication explain the high-quality of his data."},{name:"Mikhail Hlushko",role:"CEO, Automoto.ua",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/ГлушкоМихайло_6fa77158.jfif",quote:'Stanislav is one of the best business analysts in the Ukrainian automotive market. He has unique abilities to "feel" data and build correct conclusions and management decisions based on them.'},{name:"Dmytro Dutko",role:"Product Designer, Dilizy.ai",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/ДімаДутко_8df2bf69.jfif",quote:"Working alongside Stanislav was an exceptional experience. He perfectly combines deep automotive expertise with a sharp product mindset. A proactive, hands-on leader who truly knows how to bridge the gap between big-picture business goals and tangible product features."},{name:"Piotr Baranowicz",role:"Vice President CEE, AUTO1 Group",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/ПьотрБарановіч_6771e076.jfif",quote:"Stanislav is a very skilled business analyst of Ukrainian automotive market. He has helped us to get a better understanding of this complex legal & business environment. I would recommend contacting Stanislav to anyone interested in deepening the knowledge on Ukrainian car market."},{name:"Klaudia Janczak",role:"Country Manager, BCA Polska",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/КлавдіяЯнчак_5c1c6c74.jfif",quote:"I am happy to recommend working with Stanislav. Our cooperation was always professional and in a great atmosphere. He is a reliable and trustworthy business partner!"},{name:"Daniel Artisiuk",role:"B2B Growth, carVertical",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/ДаніелАртісюк_bd869679.jfif",quote:"Stanislav is the person you go to when you need to understand what's really happening in the automotive market. A genuine pleasure to work with!"},{name:"Vladimir Dubrovskiy",role:"Senior Economist, CASE Ukraine",avatar:"./resources/d2xsxph8kpxj0f.cloudfront.net/310519663214163330/oCQrdncGyc24LLr9RA7Ssg/Дубровський_99e13065.jfif",quote:"Young, ambitious and very enthusiastic professional with strong writing, analytical and advocacy skills. Knows nearly everything about the Ukrainian automotive market."},{name:"Waldemar Lichter",role:"Senior Manager, Germany Trade and Invest",avatar:"",quote:"The best expert for automotive themes for Ukraine and Europe I know! Highly recommended."},{name:"Maryna Aleksandrova",role:"Senior Product Manager, Automotive & AI SaaS",avatar:"",quote:"I highly recommend Stanislav as a highly qualified data analyst, automotive market expert and strategic business development specialist. His ability to analyze projects in detail makes him an indispensable resource."}]},footer:{rights:"All rights reserved."},uvp:"Systematic business architect: I don't just manage products — I create ecosystems where marketing, IT and operations work as a single mechanism, powered by artificial intelligence."},pl:{nav:{about:"O mnie",expertise:"Ekspertyza",projects:"Projekty",education:"Edukacja",skills:"Umiejętności",caseStudies:"Case Studies",civic:"Działalność obywatelska",media:"Media",testimonials:"Rekomendacje",latwo:"LATWO",contact:"Kontakt"},hero:{tagline:"Ekspert & Konsultant",title:"Stanisław Buczacki",subtitle:"Lider strategiczny. Architekt AI. Ekspert rynku motoryzacyjnego.",description:"Założyciel Instytutu Badań Rynku Motoryzacyjnego (AMRI) i Współzałożyciel agencji LATWO. Zbudowałem od zera nr 1 centrum analityczne rynku motoryzacyjnego na Ukrainie. 3 produkty programowe od zera. 200+ wzmianek w mediach. 10+ lat w branży motoryzacyjnej, tworzeniu oprogramowania, produktach AI, legislacji i partnerstwach międzynarodowych.",cta:"Skontaktuj się",cta_secondary:"Dowiedz się więcej",follow:"Obserwuj",badge:"lat doświadczenia"},stats:{mentions:"wzmianek w mediach",media:"partnerów medialnych",experience:"lat doświadczenia",markets:"rynki: UA, PL, CEE"},about:{sectionTag:"Biografia",title:"O mnie",p1:"Moja podróż to historia o tym, jak pasja do samochodów i wiara w siłę danych mogą zmienić całą branżę. Wszystko zaczęło się w 2014 roku od aktywizmu obywatelskiego i walki o cywilizowany rynek samochodów używanych na Ukrainie.",p2:'W latach 2016–2017 stałem się jednym z inicjatorów projektu "Mikołaj Zaporożec" — medialnego fenomenu z milionami wyświetleń, który bezpośrednio doprowadził do zmian legislacyjnych. Następnie założyłem organizację obywatelską "Dostępne Auto" (2017–2020), która kontynuowała walkę o liberalizację importu i otworzyła Ukraińcom dostęp do jakościowych samochodów z zagranicy.',p3:"W 2020 roku założyłem Instytut Badań Rynku Motoryzacyjnego (AMRI) — podniosłem projekt od zera, od idei i koncepcji do najbardziej znanego centrum analitycznego rynku motoryzacyjnego na Ukrainie. AMRI stał się nr 1 źródłem analityki dla tysięcy firm, organów rządowych i 120+ mediów. W 2025 roku zostałem Współzałożycielem LATWO — agencji konsultingowej AI nowej generacji.",p4:"Dziś łączę głęboką wiedzę branżową z praktycznym doświadczeniem w tworzeniu produktów SaaS i wdrażaniu AI. Dzięki aktywnemu networkingowi posiadam szerokie kontakty zawodowe na Ukrainie i za granicą — od dealerów samochodowych po międzynarodowe firmy analityczne. Moją misją jest pomaganie przedsiębiorcom w budowaniu systemowego biznesu i pewnym patrzeniu w przyszłość.",timeline_title:"Kluczowe momenty",hobbies_title:"Hobby",hobbies:["Samochody retro","Genealogia"]},timeline:[{year:"2009-2014",text:"Stopień architekta, Politechnika Lwowska"},{year:"2014",text:"Rozpoczęcie aktywizmu obywatelskiego. Kampanie za dostępny rynek motoryzacyjny"},{year:"2016",text:"Pierwsze zmiany legislacyjne — liberalizacja importu samochodów"},{year:"2017",text:'Projekt "Mikołaj Zaporożec" — miliony wyświetleń, zmiany legislacyjne. Dołączenie do West Auto Hub'},{year:"2018",text:'Kolejne zmiany legislacyjne. Organizacja "Dostępne Auto". Konsultant ds. marketingu i PR w WAH'},{year:"2019",text:"Główny analityk biznesowy West Auto Hub. Zarządzanie NGO na UCU"}
